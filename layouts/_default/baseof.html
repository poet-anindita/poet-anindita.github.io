<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
  <meta name="description" content="{{ .Site.Params.tagline }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <div class="page-frame">
    {{ partial "corner-bird.html" "left" }}
    {{ partial "corner-bird.html" "right" }}
    <header class="site-header">
      <a class="site-title" href="{{ "/" | relURL }}">Poet Anindita</a>
      <p class="site-tagline">{{ .Site.Params.tagline }}</p>
    </header>
    <div class="frieze"></div>
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    <div class="frieze"></div>
    <footer class="site-footer">
      <p>&copy; {{ now.Year }} Poet Anindita</p>
    </footer>
  </div>
</body>
</html>
