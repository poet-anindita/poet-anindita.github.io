{{ define "main" }}
<a class="back-link" href="{{ "/" | relURL }}">&larr; Back</a>
<p class="list-hint">Click on a title to read the poem.</p>
<div class="poem-list">
  {{ range .Pages }}
    <a class="poem-list-item" href="{{ .Permalink }}"><span lang="bn">{{ .Title }}</span><span class="arrow">&rarr;</span></a>
  {{ end }}
</div>
{{ end }}
