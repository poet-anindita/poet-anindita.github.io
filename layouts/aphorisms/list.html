{{ define "main" }}
<a class="back-link" href="{{ "/" | relURL }}">&larr; Home</a>
<div class="aphorism-list">
  {{ if .Pages }}
    {{ range .Pages }}
      <p class="aphorism-list-item">
        <span class="quote-mark">&ldquo;</span>{{ .Title }}
      </p>
    {{ end }}
  {{ else }}
    <p class="empty-note">Coming soon.</p>
  {{ end }}
</div>
{{ end }}
